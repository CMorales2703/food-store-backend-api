# ─── Configuración de producción (Railway + PostgreSQL) ──────────────────────
# Activar con: SPRING_PROFILES_ACTIVE=prod  (variable de entorno en Railway)

# Railway asigna su propio puerto vía $PORT — Spring Boot debe usarlo
server.port=${PORT:8080}

spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# H2 Console deshabilitada en producción
spring.h2.console.enabled=false

# Swagger habilitado (para demostración del TPI)
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# CORS — en producción agregar la URL de Vercel
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
